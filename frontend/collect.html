<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thai Digit Studio — Collector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0c0e14;
      --surface: rgba(23, 25, 35, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #f59e0b;
      --accent-soft: rgba(245, 158, 11, 0.1);
      --accent-glow: rgba(245, 158, 11, 0.3);
      --secondary: #ec4899;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --glass: blur(16px);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 16px;
      --spring: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    
    body {
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(245, 158, 11, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.04) 0%, transparent 50%);
      color: var(--text-main);
      font-family: 'Outfit', 'IBM Plex Sans Thai', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Floating Navbar */
    header {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 1100px;
      background: rgba(15, 17, 26, 0.8);
      backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: white;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--secondary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .logo-text { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }

    nav { display: flex; gap: 4px; }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 12px;
      transition: var(--spring);
    }
    nav a:hover { color: white; background: rgba(255,255,255,0.05); }
    nav a.active { color: white; background: var(--accent-soft); }

    /* Main Container */
    main {
      padding-top: 120px;
      max-width: 1200px;
      margin: 0 auto;
      padding-bottom: 80px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      padding-left: 20px;
      padding-right: 20px;
    }

    .panel-title-section { margin-bottom: 32px; }
    .panel-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .panel-desc { color: var(--text-muted); font-size: 15px; }

    /* Cards */
    .glass-card {
      background: var(--surface);
      backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
      position: relative;
      transition: var(--spring);
      animation: fadeIn 0.8s var(--spring);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 99px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    /* Label Selector */
    .label-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .label-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--spring);
    }
    .label-btn:hover { background: rgba(255,255,255,0.06); color: white; transform: translateY(-2px); }
    .label-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 8px 25px var(--accent-glow);
      transform: scale(1.05);
    }

    /* Input Field */
    .input-field { margin-bottom: 24px; }
    .input-field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
    .input-field input {
      width: 100%;
      height: 52px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0 16px;
      color: white;
      font-family: inherit;
      font-size: 15px;
      transition: var(--spring);
    }
    .input-field input:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.06); }

    /* Canvas Section */
    .canvas-container {
      background: white;
      border-radius: var(--radius-lg);
      padding: 6px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      position: relative;
      margin-bottom: 24px;
    }

    #drawCanvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      border-radius: 18px;
      cursor: crosshair;
      touch-action: none;
    }

    .canvas-hint {
      position: absolute;
      top: 24px;
      left: 24px;
      background: rgba(0,0,0,0.85);
      color: white;
      font-size: 36px;
      font-weight: 800;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.8);
      transition: var(--spring);
    }
    .canvas-hint.show { opacity: 1; transform: scale(1); }

    .btn-row { display: flex; gap: 12px; }
    .btn {
      flex: 1;
      height: 56px;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: var(--spring);
      border: none;
    }
    .btn:active { transform: scale(0.96); }

    .btn-save { background: var(--accent); color: white; box-shadow: 0 10px 25px var(--accent-glow); }
    .btn-save:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 35px var(--accent-glow); }
    .btn-save:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-clear { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border); }
    .btn-clear:hover { background: rgba(255,255,255,0.1); }

    .btn-undo { flex: 0 0 56px; background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-undo:hover { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

    /* Stats Section */
    .stat-card {
      background: rgba(255,255,255,0.02);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      transition: var(--spring);
    }
    .stat-card:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); }

    .stat-row { display: flex; align-items: center; gap: 16px; }
    .stat-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
    }

    .stat-info { flex: 1; }
    .stat-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }
    
    .progress-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s var(--spring); }
    .progress-fill.done { background: var(--success); box-shadow: 0 0 10px var(--success); }

    .total-summary {
      margin-top: 32px;
      text-align: center;
      padding: 32px;
      border-top: 1px solid var(--border);
    }
    .total-num { font-size: 48px; font-weight: 800; line-height: 1; margin-bottom: 8px; }
    .total-label { color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: #000;
      padding: 12px 24px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transition: var(--spring);
      opacity: 0;
      z-index: 2000;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: #ef4444; color: white; }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; padding-top: 100px; }
      header { top: 12px; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-icon">S</div>
    <span class="logo-text">Thai Digit Studio</span>
  </a>
  <nav>
    <a href="/">Predictor</a>
    <a href="/collect" class="active">Collector</a>
    <a href="/admin">Dashboard</a>
  </nav>
</header>

<main>
  <!-- Left: Collection Pad -->
  <section>
    <div class="panel-title-section">
      <h1 class="panel-title">Data Production</h1>
      <p class="panel-desc">ช่วยเราสร้าง Dataset ที่ทรงพลังที่สุดสำหรับการเรียนรู้ของ AI</p>
    </div>

    <div class="glass-card">
      <div class="step-badge">Step 1 — ข้อมูลผู้เขียน</div>
      <div class="input-field">
        <label>ชื่อหรือนามสมมติ (Writer ID)</label>
        <input type="text" id="writerInput" placeholder="เช่น สมชาย, A001..." maxlength="30">
      </div>

      <div class="step-badge">Step 2 — เลือกเป้าหมาย</div>
      <div class="label-grid" id="labelGrid">
        <!-- Labels JS -->
      </div>

      <div class="step-badge">Step 3 — วาดและบันทึก</div>
      <div class="canvas-container">
        <canvas id="drawCanvas" width="600" height="600"></canvas>
        <div id="canvasHint" class="canvas-hint">๒๑</div>
      </div>

      <div class="btn-row">
        <button class="btn btn-undo" onclick="undoLast()" title="ลบตัวอย่างล่าสุด">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 14L4 9l5-5"></path><path d="M4 9h12a5 5 0 0 1 5 5v3"></path></svg>
        </button>
        <button class="btn btn-clear" onclick="clearCanvas()">ล้างกระดาน</button>
        <button class="btn btn-save" id="saveBtn" disabled onclick="saveSample()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 3 8 15 8"></polyline></svg>
          บันทึกตัวอย่าง
        </button>
      </div>
    </div>
  </section>

  <!-- Right: Real-time Stats -->
  <aside>
    <div class="glass-card" style="position: sticky; top: 120px;">
      <div class="step-badge" style="background: var(--text-muted); color: var(--bg)">Dataset Intelligence</div>
      <div id="statsContainer">
        <!-- Stats JS -->
      </div>
      <div class="total-summary">
        <div class="total-num" id="totalCount">0</div>
        <div class="total-label">Total Dataset Size</div>
      </div>
    </div>
  </aside>
</main>

<div id="toast" class="toast">บันทึกสำเร็จ!</div>

<script>
const API = '';
const LABELS = ['๒๑','๒๒','๒๓','๒๔','๒๕'];
const TARGET = 50;

const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('canvasHint');

// State
let selectedLabel = null;
let drawing = false;
let hasDrawing = false;

// Setup Canvas
function initCanvas() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineWidth = 24;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#000000';
}
initCanvas();

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
}

function startDraw(e) {
  if(!selectedLabel) { showToast('กรุณาเลือกเลขเป้าหมายก่อนครับ!', true); return; }
  drawing = true;
  hasDrawing = true;
  ctx.beginPath();
  const p = getPos(e);
  ctx.moveTo(p.x, p.y);
  updateBtn();
}

function draw(e) {
  if(!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
window.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', () => drawing = false);

// UI Grid
const grid = document.getElementById('labelGrid');
LABELS.forEach(lbl => {
  const btn = document.createElement('div');
  btn.className = 'label-btn';
  btn.textContent = lbl;
  btn.onclick = () => {
    selectedLabel = lbl;
    document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    hint.textContent = lbl;
    hint.classList.add('show');
    clearCanvas();
    updateBtn();
  };
  grid.appendChild(btn);
});

function clearCanvas() {
  initCanvas();
  hasDrawing = false;
  updateBtn();
}

function updateBtn() {
  document.getElementById('saveBtn').disabled = !(selectedLabel && hasDrawing);
}

function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isErr);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function saveSample() {
  if(!selectedLabel || !hasDrawing) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const res = await fetch(`${API}/api/collect/save-sample`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        label: selectedLabel, 
        image: canvas.toDataURL('image/png'), 
        writer: document.getElementById('writerInput').value.trim() || 'anonymous' 
      }),
    });
    if(!res.ok) throw new Error();
    showToast(`บันทึกเลข ${selectedLabel} สำเร็จ!`);
    clearCanvas();
    loadStats();
  } catch (e) {
    showToast('เกิดข้อผิดพลาดในการบันทึก', true);
  } finally {
    btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 3 8 15 8"></polyline></svg> บันทึกตัวอย่าง';
    updateBtn();
  }
}

async function undoLast() {
  if(!selectedLabel) return;
  if(!confirm(`ยืนยันการลบตัวอย่างล่าสุดของเลข ${selectedLabel}?`)) return;
  try {
    await fetch(`${API}/api/collect/delete-last/${encodeURIComponent(selectedLabel)}`, { method: 'DELETE' });
    showToast('ลบสำเร็จ');
    loadStats();
  } catch(e) {}
}

async function loadStats() {
  try {
    const res = await fetch(`${API}/api/stats`);
    const data = await res.json();
    const container = document.getElementById('statsContainer');
    container.innerHTML = '';
    
    LABELS.forEach(lbl => {
      const n = data.counts[lbl] ?? 0;
      const p = Math.min((n / TARGET) * 100, 100);
      const done = n >= TARGET;
      container.innerHTML += `
        <div class="stat-card">
          <div class="stat-row">
            <div class="stat-icon">${lbl}</div>
            <div class="stat-info">
              <div class="stat-header">
                <span>${done ? '✅ Goal Reached' : `Target: ${TARGET}`}</span>
                <span style="color:white">${n} / ${TARGET}</span>
              </div>
              <div class="progress-track">
                <div class="progress-fill ${done ? 'done' : ''}" style="width:${p}%"></div>
              </div>
            </div>
          </div>
        </div>`;
    });
    document.getElementById('totalCount').textContent = data.total;
  } catch(e) {}
}

loadStats();
setInterval(loadStats, 10000);
</script>
</body>
</html>
